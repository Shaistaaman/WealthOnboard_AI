<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f3d66" />
      <stop offset="100%" stop-color="#51779e" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Blue gradient background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- Main rising chart line (#f8b319) with animation -->
  <path id="mainChart"
        d="M100 700 C300 650 400 550 600 500 S900 400 1200 300" 
        fill="none" 
        stroke="#f8b319" 
        stroke-width="3" 
        stroke-linecap="round"
        opacity="0.7"
        filter="url(#glow)">
    <animate attributeName="stroke-dasharray"
             from="0,1000"
             to="1000,0"
             dur="2s"
             fill="freeze" />
    <animate attributeName="stroke-dashoffset"
             from="1000"
             to="0"
             dur="2s"
             fill="freeze" />
  </path>
  
  <!-- Secondary chart lines (#f8b319) -->
  <g opacity="0.4">
    <path d="M50 750 C250 720 350 680 550 650 S850 600 1150 550" 
          fill="none" 
          stroke="#f8b319" 
          stroke-width="1.5"
          stroke-dasharray="5,3"/>
    
    <path d="M150 650 C350 600 450 500 650 450 S950 350 1250 250" 
          fill="none" 
          stroke="#f8b319" 
          stroke-width="1.2"/>
  </g>
  
  <!-- Subtle grid reference (#fcd46a) -->
  <g opacity="0.08" stroke="#fcd46a" stroke-width="0.5">
    <!-- Horizontal lines -->
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="450" x2="1440" y2="450"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <!-- Vertical lines -->
    <line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="900" y1="0" x2="900" y2="900"/>
  </g>
  
  <!-- Data point indicators (#f8b319) with pop-in animation -->
  <g fill="#f8b319" opacity="0.8">
    <circle cx="300" cy="650" r="0">
      <animate attributeName="r" from="0" to="8" dur="0.4s" begin="1.2s" fill="freeze"/>
      <animate attributeName="r" from="8" to="3" dur="0.3s" begin="1.6s" fill="freeze"/>
    </circle>
    <circle cx="600" cy="550" r="0">
      <animate attributeName="r" from="0" to="8" dur="0.4s" begin="1.4s" fill="freeze"/>
      <animate attributeName="r" from="8" to="3" dur="0.3s" begin="1.8s" fill="freeze"/>
    </circle>
    <circle cx="900" cy="450" r="0">
      <animate attributeName="r" from="0" to="8" dur="0.4s" begin="1.6s" fill="freeze"/>
      <animate attributeName="r" from="8" to="3" dur="0.3s" begin="2.0s" fill="freeze"/>
    </circle>
    <circle cx="1200" cy="350" r="0">
      <animate attributeName="r" from="0" to="8" dur="0.4s" begin="1.8s" fill="freeze"/>
      <animate attributeName="r" from="8" to="3" dur="0.3s" begin="2.2s" fill="freeze"/>
    </circle>
  </g>
</svg>
